<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Dashboard — mk-motion</title>
    <link rel="stylesheet" href="../../dist/style.css" />
    <style>
      body {
        margin: 0;
        background: var(--mk-bg);
        color: var(--mk-text);
        font-family:
          system-ui,
          -apple-system,
          sans-serif;
      }
      .dashboard {
        display: flex;
        height: 100vh;
      }
      .sidebar {
        width: 240px;
        background: var(--mk-surface);
        border-right: 1px solid var(--mk-border);
        padding: 24px 16px;
      }
      .sidebar h2 {
        font-size: 1rem;
        margin: 0 0 16px;
        padding: 0 8px;
      }
      .sidebar nav {
        display: flex;
        flex-direction: column;
        gap: 4px;
      }
      .sidebar a {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 10px 12px;
        border-radius: var(--mk-radius);
        color: var(--mk-text-secondary);
        text-decoration: none;
        font-size: 0.875rem;
      }
      .sidebar a:hover,
      .sidebar a.active {
        background: var(--mk-primary-soft);
        color: var(--mk-primary);
      }
      .main {
        flex: 1;
        display: flex;
        flex-direction: column;
        overflow: auto;
      }
      .header {
        height: 60px;
        background: var(--mk-surface);
        border-bottom: 1px solid var(--mk-border);
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 24px;
      }
      .content {
        padding: 24px;
      }
      .stats {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
        gap: 16px;
        margin-bottom: 24px;
      }
      .stat-card {
        background: var(--mk-surface);
        border: 1px solid var(--mk-border);
        border-radius: var(--mk-radius);
        padding: 20px;
      }
      .stat-card .value {
        font-size: 1.5rem;
        font-weight: 700;
        color: var(--mk-text);
        margin-top: 8px;
      }
      .stat-card .label {
        font-size: 0.8rem;
        color: var(--mk-text-secondary);
      }
      .table-wrap {
        background: var(--mk-surface);
        border: 1px solid var(--mk-border);
        border-radius: var(--mk-radius);
        overflow: auto;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        font-size: 0.875rem;
      }
      th,
      td {
        padding: 12px 16px;
        text-align: left;
        border-bottom: 1px solid var(--mk-border);
      }
      th {
        color: var(--mk-text-secondary);
        font-weight: 600;
        background: var(--mk-bg-elevated);
      }
      tr:hover td {
        background: var(--mk-surface-hover);
      }
      .tag {
        display: inline-block;
        padding: 2px 8px;
        border-radius: 9999px;
        font-size: 0.75rem;
      }
      .tag-success {
        background: var(--mk-success-soft);
        color: var(--mk-success);
      }
      .tag-warning {
        background: var(--mk-warning-soft);
        color: var(--mk-warning);
      }
      .tag-danger {
        background: var(--mk-danger-soft);
        color: var(--mk-danger);
      }
    </style>
  </head>
  <body>
    <div class="dashboard">
      <aside class="sidebar">
        <h2>🚀 MotionKit</h2>
        <nav>
          <a href="#" class="active">📊 Dashboard</a>
          <a href="#">👤 Users</a>
          <a href="#">📦 Orders</a>
          <a href="#">⚙️ Settings</a>
        </nav>
      </aside>
      <div class="main">
        <header class="header">
          <div style="font-weight: 600">Dashboard</div>
          <div id="header-actions"></div>
        </header>
        <div class="content">
          <div class="stats" id="stats"></div>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>ID</th>
                  <th>User</th>
                  <th>Status</th>
                  <th>Amount</th>
                  <th>Date</th>
                </tr>
              </thead>
              <tbody id="table-body"></tbody>
            </table>
          </div>
        </div>
      </div>
    </div>

    <script type="module">
      import { createButton } from '../../dist/legacy.js'
      import { countUp } from '../../dist/mk-motion.js'

      // Default to light theme
      document.documentElement.setAttribute('data-mk-theme', 'light')

      // Header actions
      const actionsEl = document.getElementById('header-actions')
      const refreshBtn = createButton({
        text: 'Refresh',
        type: 'primary',
        size: 'small',
      })
      const exportBtn = createButton({
        text: 'Export',
        type: 'default',
        size: 'small',
      })
      actionsEl.appendChild(refreshBtn)
      actionsEl.appendChild(document.createTextNode('\u00A0'))
      actionsEl.appendChild(exportBtn)

      // Theme toggler
      const themeWrap = document.createElement('div')
      themeWrap.style.cssText = 'display:inline-flex;gap:6px;margin-left:12px;'
      ;['light', 'dark', 'auto'].forEach((mode) => {
        const btn = createButton({
          text: mode === 'light' ? '☀️' : mode === 'dark' ? '🌙' : 'Auto',
          type: 'default',
          size: 'small',
        })
        btn.addEventListener('click', () => {
          if (mode === 'auto') {
            const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches
            document.documentElement.setAttribute(
              'data-mk-theme',
              prefersDark ? 'dark' : 'light'
            )
          } else {
            document.documentElement.setAttribute('data-mk-theme', mode)
          }
        })
        themeWrap.appendChild(btn)
      })
      actionsEl.appendChild(themeWrap)

      // Stats cards
      const statsEl = document.getElementById('stats')
      const stats = [
        { label: 'Total Revenue', value: 128400, prefix: '$' },
        { label: 'Active Users', value: 8420, prefix: '' },
        { label: 'Orders', value: 1240, prefix: '' },
        { label: 'Conversion', value: 3.2, prefix: '', suffix: '%' },
      ]

      stats.forEach((s, i) => {
        const card = document.createElement('div')
        card.className = 'stat-card'
        card.innerHTML = `
        <div class="label">${s.label}</div>
        <div class="value" id="stat-${i}">${s.prefix}${s.value}${s.suffix || ''}</div>
      `
        statsEl.appendChild(card)

        // Animate count up
        const valueEl = card.querySelector('.value')
        if (typeof s.value === 'number' && Number.isInteger(s.value)) {
          valueEl.textContent = s.prefix + '0'
          countUp(valueEl, s.value, { duration: 1500, delay: i * 150 }).then(
            () => {
              valueEl.textContent = s.prefix + s.value.toLocaleString()
            }
          )
        }
      })

      // Table rows
      const tbody = document.getElementById('table-body')
      const rows = [
        {
          id: '#1001',
          user: 'Alice Chen',
          status: 'success',
          amount: '$240.00',
          date: '2024-06-01',
        },
        {
          id: '#1002',
          user: 'Bob Wang',
          status: 'warning',
          amount: '$120.00',
          date: '2024-06-02',
        },
        {
          id: '#1003',
          user: 'Carol Li',
          status: 'success',
          amount: '$560.00',
          date: '2024-06-02',
        },
        {
          id: '#1004',
          user: 'David Zhang',
          status: 'danger',
          amount: '$80.00',
          date: '2024-06-03',
        },
        {
          id: '#1005',
          user: 'Eva Liu',
          status: 'success',
          amount: '$320.00',
          date: '2024-06-03',
        },
      ]

      rows.forEach((r, i) => {
        const tr = document.createElement('tr')
        tr.innerHTML = `
        <td>${r.id}</td>
        <td>${r.user}</td>
        <td><span class="tag tag-${r.status}">${r.status.toUpperCase()}</span></td>
        <td>${r.amount}</td>
        <td>${r.date}</td>
      `
        tr.style.opacity = '0'
        tr.style.transform = 'translateY(12px)'
        tbody.appendChild(tr)
        requestAnimationFrame(() => {
          tr.style.transition = 'opacity 0.4s ease, transform 0.4s ease'
          tr.style.transitionDelay = `${i * 60}ms`
          tr.style.opacity = '1'
          tr.style.transform = 'translateY(0)'
        })
      })
    </script>
  </body>
</html>
